server {
    listen 80;
    listen [::]:80;

    server_name artistes.ne.ch;
    root        /data/artistes/current/public;
    index       index.php index.html index.htm;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                always;
    add_header X-XSS-Protection       "1; mode=block"             always;
    add_header X-Content-Type-Options "nosniff"                   always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Content-Security-Policy — sources utilisées par l'application :
    #   script-src  : assets Vite locaux + Alpine.js/Livewire (unsafe-inline/eval requis)
    #   style-src   : assets Vite locaux + styles inline Alpine + Bunny Fonts CSS
    #   font-src    : polices locales (Vite) + Bunny Fonts (Public Sans, Lora)
    #   img-src     : images locales, data URI (avatars base64), HTTPS externe (photos artistes)
    #   connect-src : requêtes Livewire fetch vers la même origine
    #   object-src  : désactivé (aucun plugin Flash/Java)
    #   base-uri    : limité à soi-même (anti-injection de <base>)
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; font-src 'self' https://fonts.bunny.net; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self';"
        always;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml+rss
        image/svg+xml;

    # ── Laravel front-controller ──────────────────────────────────────────
    # IMPORTANT : ?$query_string est obligatoire pour que PHP reçoive les
    # paramètres de callback OAuth (ex. ?code=..., ?state=...).
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass  unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;

        # Utilise $realpath_root pour éviter les problèmes de symlinks Octopus
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi.conf;

        fastcgi_hide_header X-Powered-By;

        # Buffers adaptés aux réponses Filament/Livewire
        fastcgi_buffers            16 16k;
        fastcgi_buffer_size        32k;
        fastcgi_read_timeout       300;
    }

    # ── Static assets — cache long terme ─────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        try_files $uri /index.php?$query_string;
        expires            1y;
        add_header Cache-Control "public, immutable";
        access_log         off;
        log_not_found      off;
    }

    # ── Favicon & robots ─────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Security : fichiers cachés et sensibles ───────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(\.env|\.git|composer\.(json|lock)|package\.json|package-lock\.json|pnpm-lock\.yaml) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
